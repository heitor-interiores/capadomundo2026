<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 - Tabela & Simulador Dinâmico</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #1f6feb;
            --live-color: #f85149;
            --timeline-bg: #21262d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #1f6feb, #238636);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Filtros Responsivos */
        .filter-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            width: 100%;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .filter-select:focus {
            border-color: var(--accent-color);
        }

        /* Grid de Jogos */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .match-card.is-live {
            border-color: var(--live-color);
            box-shadow: 0 0 12px rgba(248, 81, 73, 0.2);
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .group-badge {
            background-color: rgba(31, 111, 235, 0.1);
            color: var(--accent-color);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .live-badge {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--live-color);
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--live-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-name {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }

        .score-display {
            width: 40px;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
        }

        /* Seção de Eventos (Gols) */
        .match-events {
            margin: 5px 0 12px 0;
            padding: 8px 12px;
            background: var(--timeline-bg);
            border-radius: 6px;
            font-size: 0.75rem;
            max-height: 85px;
            overflow-y: auto;
            border-left: 3px solid var(--accent-color);
        }
        
        .match-events.live-events {
            border-left-color: var(--live-color);
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 4px;
        }
        
        .event-item:last-child {
            margin-bottom: 0;
        }

        .match-details {
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Ajustes específicos para telas bem pequenas (Celulares) */
        @media(max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .filter-container { grid-template-columns: repeat(2, 1fr); }
            .matches-grid { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <script>

            { id: 21, type: "grupo", group: "K", label: "Rodada 1", date: "17/06", time: "14:00", team1: "Portugal", team2: "RD Congo", city: "Houston", score1: 0, score2: 0, currentMinute: 0, status: "scheduled", events: [] },

            { id: 23, type: "grupo", group: "L", label: "Rodada 1", date: "17/06", time: "17:00", team1: "Inglaterra", team2: "Croácia", city: "Dallas", score1: 0, score2: 0, currentMinute: 0, status: "scheduled", events: [] },
            { id: 24, type: "grupo", group: "L", label: "Rodada 1", date: "17/06", time: "20:00", team1: "Gana", team2: "Panamá", city: "Toronto", score1: 0, score2: 0, currentMinute: 0, status: "scheduled", events: [] }
        ];

        // Lógica de Atualização Dinâmica de Tempo e Placar
        function updateLiveEngine() {
            const now = new Date();
            const currentDayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

            matches.forEach(match => {
                const [matchHour, matchMin] = match.time.split(':').map(Number);
                const matchDateParts = match.date.split('/');
                const matchTimeMs = new Date(now.getFullYear(), Number(matchDateParts[1]) - 1, Number(matchDateParts[0]), matchHour, matchMin).getTime();
                const nowMs = now.getTime();
                const matchDurationMs = 105 * 60 * 1000; // 90 min + acréscimos e intervalo

                if (nowMs >= matchTimeMs && nowMs <= (matchTimeMs + matchDurationMs)) {
                    // O jogo está acontecendo AO VIVO
                    match.status = "live";
                    const diffMinutes = Math.floor((nowMs - matchTimeMs) / 60000);
                    match.currentMinute = diffMinutes > 90 ? 90 : (diffMinutes < 1 ? 1 : diffMinutes);

                    // Chance aleatória de sair um gol no loop atual (aproximadamente 1% de chance a cada ciclo)
                    if (Math.random() < 0.015 && match.currentMinute < 90) {
                        const teamScored = Math.random() > 0.5 ? 1 : 2;
                        if (teamScored === 1) match.score1++; else match.score2++;

                        const scorerName = playersList[Math.floor(Math.random() * playersList.length)];
                        match.events.push({
                            minute: match.currentMinute,
                            teamName: teamScored === 1 ? match.team1 : match.team2,
                            scorer: scorerName
                        });
                    }
                } else if (nowMs > (matchTimeMs + matchDurationMs)) {
                    // O jogo já encerrou
                    if (match.status !== "finished") {
                        match.status = "finished";
                        match.currentMinute = 90;
                        // Caso tenha terminado sem simulação, atribui um placar final amador
                        if (match.score1 === 0 && match.score2 === 0 && match.events.length === 0) {
                            match.score1 = Math.floor(Math.random() * 3);
                            match.score2 = Math.floor(Math.random() * 3);
                            generatePastEvents(match);
                        }
                    }
                } else {
                    // Jogo agendado para o futuro
                    match.status = "scheduled";
                }
            });
        }

        // Gera eventos retroativos estáveis para jogos do passado
        function generatePastEvents(match) {
            for (let i = 0; i < match.score1; i++) {
                match.events.push({ minute: Math.floor(Math.random() * 85) + 1, teamName: match.team1, scorer: playersList[Math.floor(Math.random() * playersList.length)] });
            }
            for (let i = 0; i < match.score2; i++) {
                match.events.push({ minute: Math.floor(Math.random() * 85) + 1, teamName: match.team2, scorer: playersList[Math.floor(Math.random() * playersList.length)] });
            }
            match.events.sort((a, b) => a.minute - b.minute);
        }

        function renderMatches(list) {
            const grid = document.getElementById('matchesGrid');
            grid.innerHTML = '';

            if (list.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px; font-size:0.9rem;">Nenhum jogo encontrado.</div>`;
                return;
            }

            list.forEach(match => {
                const isLive = match.status === "live";
                const isFinished = match.status === "finished";

                const card = document.createElement('div');
                card.className = `match-card ${isLive ? 'is-live' : ''}`;

                let badgeHTML = `<span class="group-badge">${match.type === 'grupo' ? 'Grupo ' + match.group : 'MATA-MATA'}</span>`;
                if (isLive) {
                    badgeHTML = `<span class="live-badge"><span class="live-dot"></span>${match.currentMinute}' M</span>`;
                } else if (isFinished) {
                    badgeHTML = `<span class="group-badge" style="background:rgba(255,255,255,0.05); color:var(--text-secondary)">Encerrado</span>`;
                }

                let eventsHTML = '';
                if (match.events && match.events.length > 0) {
                    eventsHTML = `<div class="match-events ${isLive ? 'live-events' : ''}">`;
                    match.events.forEach(ev => {
                        eventsHTML += `<div class="event-item">⚽ <b>${ev.minute}'</b> ${ev.scorer} (${ev.teamName})</div>`;
                    });
                    eventsHTML += `</div>`;
                }

                card.innerHTML = `
                    <div class="match-meta">
                        <span>${match.label}</span>
                        ${badgeHTML}
                    </div>
                    <div class="teams-container">
                        <div class="team-row">
                            <span class="team-name" style="${isFinished && match.score1 > match.score2 ? 'color:#fff; font-weight:700;' : ''}">${match.team1}</span>
                            <div class="score-display">${isLive || isFinished ? match.score1 : '-'}</div>
                        </div>
                        <div class="team-row">
                            <span class="team-name" style="${isFinished && match.score2 > match.score1 ? 'color:#fff; font-weight:700;' : ''}">${match.team2}</span>
                            <div class="score-display">${isLive || isFinished ? match.score2 : '-'}</div>
                        </div>
                    </div>
                    ${eventsHTML}
                    <div class="match-details">
                        <span>📅 ${match.date} — ${match.time}</span>
                        <span>📍 ${match.city}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            const timeVal = document.getElementById('timeSelect').value;
            const dateVal = document.getElementById('dateSelect').value;
            const stageVal = document.getElementById('stageSelect').value;
            const groupSelect = document.getElementById('groupSelect');

            if (stageVal !== 'all' && stageVal !== 'grupo') {
                groupSelect.disabled = true;
                groupSelect.value = 'all';
            } else {
                groupSelect.disabled = false;
            }

            const currentGroupVal = groupSelect.value;
            const now = new Date();
            const todayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

            const filtered = matches.filter(m => {
                if (timeVal === 'hoje' && m.date !== todayStr) return false;
                if (timeVal === 'aovivo' && m.status !== 'live') return false;
                if (dateVal !== 'all' && m.date !== dateVal) return false;
                if (stageVal !== 'all' && m.type !== stageVal) return false;
                if (currentGroupVal !== 'all' && m.group !== currentGroupVal) return false;
                return true;
            });

            renderMatches(filtered);
        }

        // Loop de execução em tempo real (atualiza a tela a cada 3 segundos)
        function mainEngine() {
            updateLiveEngine();
            applyFilters();
        }

        // Inicialização
        mainEngine();
        setInterval(mainEngine, 3000);
    </script>
