<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 - Tabela & Simulador Dinâmico</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #1f6feb;
            --live-color: #f85149;
            --timeline-bg: #21262d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #1f6feb, #238636);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            max-width: 220px;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            border-color: var(--accent-color);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .match-card.is-live {
            border-color: var(--live-color);
            box-shadow: 0 0 12px rgba(248, 81, 73, 0.2);
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .group-badge {
            background-color: rgba(31, 111, 235, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .live-badge {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--live-color);
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--live-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        .game-time {
            font-weight: 700;
            color: var(--live-color);
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-name {
            font-size: 1.05rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .score-display {
            width: 45px;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Linha do Tempo de Gols (Eventos) */
        .match-events {
            margin-top: 5px;
            margin-bottom: 12px;
            padding: 6px 10px;
            background: var(--timeline-bg);
            border-radius: 6px;
            font-size: 0.75rem;
            max-height: 75px;
            overflow-y: auto;
            border-left: 3px solid var(--accent-color);
        }
        
        .match-events.live-events {
            border-left-color: var(--live-color);
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-main);
            margin-bottom: 2px;
        }
        
        .event-item:last-child {
            margin-bottom: 0;
        }

        .match-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Responsividade Mobile Fluida */
        @media(max-width: 580px) {
            header h1 { font-size: 1.6rem; }
            .filter-container { 
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                width: 100%; 
            }
            .filter-select { max-width: 100%; min-width: 0; width: 100%; }
            .matches-grid { grid-template-columns: 1fr; }
            body { padding: 15px 10px; }
        }
    </style>
</head>

        // Lógica de Atualização Temporal e Simulação Dinâmica
        function updateMatchStatuses() {
            const now = new Date();
            const currentDayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

            matches.forEach(match => {
                if (match.date !== currentDayStr) {
                    // Se a data já passou no calendário da Copa, define como encerrado (se não simulado)
                    const [mDay, mMonth] = match.date.split('/').map(Number);
                    if (now.getMonth() + 1 > mMonth || (now.getMonth() + 1 === mMonth && now.getDate() > mDay)) {
                        if (match.status !== "finished") {
                            match.status = "finished";
                            match.currentMinute = 90;
                            // Gera um placar final amador caso esteja zerado para não ficar vazio
                            if(match.score1 === 0 && match.score2 === 0) {
                                match.score1 = Math.floor(Math.random() * 3);
                                match.score2 = Math.floor(Math.random() * 3);
                                generateMockEvents(match);
                            }
                        }
                    }
                    return;
                }

                // Cálculo do tempo para o dia de HOJE
                const [matchHour, matchMin] = match.time.split(':').map(Number);
                const matchTimeMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), matchHour, matchMin).getTime();
                const nowMs = now.getTime();
                const gameDurationMs = 105 * 60 * 1000; // 90 min + acréscimos e intervalo (aprox 1h45)

                if (nowMs >= matchTimeMs && nowMs <= (matchTimeMs + gameDurationMs)) {
                    match.status = "live";
                    // Calcula o minuto atual baseado na hora real de início (ajustado para caber nos 90 min)
                    const diffMinutes = Math.floor((nowMs - matchTimeMs) / 60000);
                    match.currentMinute = diffMinutes > 90 ? 90 : (diffMinutes < 1 ? 1 : diffMinutes);
                    
                    // Probabilidade aleatória em tempo real de sair gol no loop atual (0.8% por atualização)
                    if (Math.random() < 0.008 && match.currentMinute < 90) {
                        const luckyTeam = Math.random() > 0.5 ? 1 : 2;
                        if (luckyTeam === 1) match.score1++; else match.score2++;
                        
                        const scorer = soccerPlayers[Math.floor(Math.random() * soccerPlayers.length)];
                        match.events.push({
                            minute: match.currentMinute,
                            team: luckyTeam === 1 ? match.team1 : match.team2,
                            scorer: scorer
                        });
                    }
                } else if (nowMs > (matchTimeMs + gameDurationMs)) {
                    if (match.status !== "finished") {
                        match.status = "finished";
                        match.currentMinute = 90;
                    }
                } else {
                    match.status = "scheduled";
                    match.currentMinute = 0;
                }
            });
        }

        // Gera eventos retroativos para jogos que já terminaram
        function generateMockEvents(match) {
            match.events = [];
            for(let i=0; i<match.score1; i++) {
                match.events.push({ minute: Math.floor(Math.random() * 88) + 1, team: match.team1, scorer: soccerPlayers[Math.floor(Math.random() * soccerPlayers.length)] });
            }
            for(let i=0; i<match.score2; i++) {
                match.events.push({ minute: Math.floor(Math.random() * 88) + 1, team: match.team2, scorer: soccerPlayers[Math.floor(Math.random() * soccerPlayers.length)] });
            }
            match.events.sort((a,b) => a.minute - b.minute);
        }

        function renderMatches(list) {
            const grid = document.getElementById('matchesGrid');
            grid.innerHTML = '';

            if (list.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px; font-size: 0.9rem;">Nenhum jogo encontrado para os filtros selecionados.</div>`;
                return;
            }

            list.forEach(match => {
                const isLive = match.status === "live";
                const isFinished = match.status === "finished";
                
                const card = document.createElement('div');
                card.className = `match-card ${isLive ? 'is-live' : ''}`;
                
                // Renderização da linha do tempo/gols do jogo
                let eventsHTML = '';
                if (match.events.length > 0) {
                    eventsHTML = `<div class="match-events ${isLive ? 'live-events' : ''}">`;
                    match.events.forEach(ev => {
                        eventsHTML += `<div class="event-item">⚽ <b>${ev.minute}'</b> ${ev.scorer} (${ev.team})</div>`;
                    });
                    eventsHTML += `</div>`;
                } else if (isFinished || isLive) {
                    eventsHTML = `<div class="match-events" style="color: var(--text-secondary); text-align:center; border-left:none; font-style:italic;">Sem gols anotados</div>`;
                }

                // Badge Dinâmica de Estado de Jogo
                let badgeStatus = `<span class="group-badge">${match.type === 'grupo' ? 'Grupo ' + match.group : 'MATA-MATA'}</span>`;
                if (isLive) {
                    badgeStatus = `<span class="live-badge"><span class="live-dot"></span><span class="game-time">${match.currentMinute}' M</span></span>`;
                } else if (isFinished) {
                    badgeStatus = `<span class="group-badge" style="background: rgba(255,255,255,0.05); color: var(--text-secondary)">Encerrado</span>`;
                }
                
                card.innerHTML = `
                    <div class="match-meta">
                        <span>${match.label}</span>
                        ${badgeStatus}
                    </div>
                    <div class="teams-container">
                        <div class="team-row">
                            <span class="team-name" style="${isFinished && match.score1 > match.score2 ? 'font-weight:800; color:#fff;' : ''}">${match.team1}</span>
                            <div class="score-display">${isFinished || isLive ? match.score1 : '-'}</div>
                        </div>
                        <div class="team-row">
                            <span class="team-name" style="${isFinished && match.score2 > match.score1 ? 'font-weight:800; color:#fff;' : ''}">${match.team2}</span>
                            <div class="score-display">${isFinished || isLive ? match.score2 : '-'}</div>
                        </div>
                    </div>
                    ${eventsHTML}
                    <div class="match-details">
                        <span>📅 ${match.date} — ${match.time}</span>
                        <span>📍 ${match.city}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            const timeVal = document.getElementById('timeSelect').value;
            const dateVal = document.getElementById('dateSelect').value;
            const stageVal = document.getElementById('stageSelect').value;
            const groupSelect = document.getElementById('groupSelect');

            if (stageVal !== 'all' && stageVal !== 'grupo') {
                groupSelect.disabled = true;
                groupSelect.value = 'all';
            } else {
                groupSelect.disabled = false;
            }

            const currentGroupVal = groupSelect.value;
            const now = new Date();
            const todayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

            const filtered = matches.filter(m => {
                if (timeVal === 'hoje' && m.date !== todayStr) return false;
                if (timeVal === 'aovivo' && m.status !== 'live') return false;
                if (dateVal !== 'all' && m.date !== dateVal) return false;
                if (stageVal !== 'all' && m.type !== stageVal) return false;
                if (currentGroupVal !== 'all' && m.group !== currentGroupVal) return false;

                return true;
            });

            renderMatches(filtered);
        }

        // Loop de Automação Principal (Roda a cada 2 segundos atualizando placar e tempo de jogo)
        function engineLoop() {
            updateMatchStatuses();
            applyFilters();
        }

        // Inicialização
        engineLoop();
        setInterval(engineLoop, 2000);
    </script>
