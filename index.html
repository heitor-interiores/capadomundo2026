<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 - Tabela & Simulador</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #1f6feb;
            --live-color: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #1f6feb, #238636);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            flex: 1;
            min-width: 160px;
            max-width: 220px;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            border-color: var(--accent-color);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .match-card.is-live {
            border-color: var(--live-color);
            box-shadow: 0 0 10px rgba(248, 81, 73, 0.15);
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .group-badge {
            background-color: rgba(31, 111, 235, 0.1);
            color: var(--accent-color);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .live-badge {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--live-color);
            padding: 2px 6px;
            border-radius: 4px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-name {
            font-size: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }

        .score-input {
            width: 45px;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            -moz-appearance: textfield;
        }

        .score-input:focus {
            border-color: var(--accent-color);
            background: rgba(31, 111, 235, 0.1);
        }

        .score-input::-webkit-inner-spin-button, 
        .score-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .match-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        @media(max-width: 480px) {
            header h1 { font-size: 1.7rem; }
            .filter-container { flex-direction: column; align-items: center; width: 100%; }
            .filter-select { max-width: 100%; width: 100%; }
            body { padding: 15px 10px; }
        }
    </style>
</head>

        function checkIsLive(match) {
            const now = new Date();
            const currentDayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');
            
            if (match.date !== currentDayStr) return false;

            const [matchHour, matchMin] = match.time.split(':').map(Number);
            const matchTimeMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), matchHour, matchMin).getTime();
            const nowMs = now.getTime();
            const twoHoursInMs = 2 * 60 * 60 * 1000;

            return nowMs >= matchTimeMs && nowMs <= (matchTimeMs + twoHoursInMs);
        }

        function updateScore(matchId, teamField, value) {
            const match = matches.find(m => m.id === matchId);
            if (match) match[teamField] = value;
        }

        function renderMatches(list) {
            const grid = document.getElementById('matchesGrid');
            grid.innerHTML = '';

            if (list.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px; font-size: 0.9rem;">Nenhum jogo encontrado para os filtros selecionados.</div>`;
                return;
            }

            list.forEach(match => {
                const isLiveNow = checkIsLive(match);
                const card = document.createElement('div');
                card.className = `match-card ${isLiveNow ? 'is-live' : ''}`;
                
                card.innerHTML = `
                    <div class="match-meta">
                        <span>${match.label}</span>
                        ${isLiveNow ? '<span class="live-badge">● AO VIVO</span>' : `<span class="group-badge">${match.type === 'grupo' ? 'Grupo ' + match.group : 'MATA-MATA'}</span>`}
                    </div>
                    <div class="teams-container">
                        <div class="team-row">
                            <span class="team-name">${match.team1}</span>
                            <input type="number" class="score-input" min="0" placeholder="-" value="${match.score1}" 
                                oninput="updateScore(${match.id}, 'score1', this.value)">
                        </div>
                        <div class="team-row">
                            <span class="team-name">${match.team2}</span>
                            <input type="number" class="score-input" min="0" placeholder="-" value="${match.score2}" 
                                oninput="updateScore(${match.id}, 'score2', this.value)">
                        </div>
                    </div>
                    <div class="match-details">
                        <span>📅 ${match.date} — ${match.time}</span>
                        <span>📍 ${match.city}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            const timeVal = document.getElementById('timeSelect').value;
            const dateVal = document.getElementById('dateSelect').value;
            const stageVal = document.getElementById('stageSelect').value;
            const groupSelect = document.getElementById('groupSelect');

            if (stageVal !== 'all' && stageVal !== 'grupo') {
                groupSelect.disabled = true;
                groupSelect.value = 'all';
            } else {
                groupSelect.disabled = false;
            }

            const currentGroupVal = groupSelect.value;
            const now = new Date();
            const todayStr = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');

            const filtered = matches.filter(m => {
                if (timeVal === 'hoje' && m.date !== todayStr) return false;
                if (timeVal === 'aovivo' && !checkIsLive(m)) return false;
                if (dateVal !== 'all' && m.date !== dateVal) return false;
                if (stageVal !== 'all' && m.type !== stageVal) return false;
                if (currentGroupVal !== 'all' && m.group !== currentGroupVal) return false;

                return true;
            });

            renderMatches(filtered);
        }

        renderMatches(matches);
    </script>
